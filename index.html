<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Virtual de FabLab Cuenca</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            /* PRESERVED: Your gray-white background fix */
            background-image: none !important;      
            background-color: #f5f5f7 !important;   
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        #tour-container {
            width: 80%;
            height: 75vh;             
            margin: 40px auto;
            border: 2px solid #000000;
            border-radius: 10px;
            background-color: #ffffff;             
            padding: 30px;            /* Forces exactly 30px spacing on all 4 sides */
            box-sizing: border-box;   
            overflow: hidden;         /* Prevents any internal content from leaking out */
        }
        #tour-container iframe {
            width: 100% !important;
            height: 100% !important;   /* Forces the player window to stretch perfectly to the bottom border */
            display: block !important;
            margin: 0 !important;      /* Clears out hidden internal offsets pushing it up */
            padding: 0 !important;
        }
    </style>
</head>
<body>
    <h1>Tour Virtual de FabLab Cuenca</h1>
    <div id="tour-container">
        <iframe src="images/app-files5/index.html" frameborder="0" allowfullscreen></iframe>
    </div>
</body>
</html>

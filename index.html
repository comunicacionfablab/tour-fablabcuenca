<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Tour - FabLab Cuenca</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #tour-container {
            width: 80%;
            height: 80vh;
            margin: 40px auto;
            border: 2px solid #000000;
            border-radius: 10px;
            /* CHANGED: Equalized all sides to exactly 30px padding */
            padding: 30px;
            /* CHANGED: Added box-sizing to keep margins perfectly stable */
            box-sizing: border-box;
        }
        /* CHANGED: Added iframe rules to force the tour to stretch evenly to the bottom */
        iframe {
            width: 100%;
            height: 100%;
            display: block;
        }
        body {
            background-image: none !important;    /* Removes the image */
            background-color: #edf2f7 !important;   /* Sets light gray background */
            background-size: cover; 
            background-repeat: no-repeat; 
            background-position: center;
        }
    </style>
</head>
<body>
    <div id="tour-container">
        <iframe width="100%" height="100%" src="images/app-files/index.html" frameborder="0" allowfullscreen></iframe>
    </div>
</body>
</html>

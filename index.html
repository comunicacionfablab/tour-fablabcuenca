<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Tour - FabLab Cuenca</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #tour-container {
            width: 80%;
            height: 80vh;
            margin: 40px auto;
            border: 2px solid #000000;
            border-radius: 10px;
            padding: 30px;
            box-sizing: border-box;
            background-color: #ffffff;
        }
        iframe {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
            background-color: #ffffff; 
        }
        body {
            background-image: none !important;    
            background-color: #edf2f7 !important;   
            background-size: cover; 
            background-repeat: no-repeat; 
            background-position: center;
        }
        /* Mobile-friendly balancing rules */
        @media (max-width: 768px) {
            #tour-container {
                width: 95%;      
                height: 70vh;    
                padding: 15px;   
                margin: 20px auto;
            }
        }
    </style>
</head>
<body>
    <div id="tour-container">
        <iframe width="100%" height="100%" src="images/app-files/index.html" frameborder="0" allowfullscreen></iframe>
    </div>
</body>
</html>
